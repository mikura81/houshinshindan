        // ── メインコンポーネント ─────────────────────────────────

        function HoushinShindan() {
            const [step, setStep] = useState("start");
            const [history, setHistory] = useState([]);
            const [answered, setAnswered] = useState({});

            const isQuestion = step.startsWith("q");
            const isResult = step.startsWith("r_");
            const isStart = step === "start";

            const currentQ = isQuestion ? questions[step] : null;
            const currentR = isResult ? results[step] : null;

            const handleAnswer = (answer) => {
                const nextStep = questions[step][answer];
                setAnswered((prev) => ({ ...prev, [step]: answer }));
                setHistory((prev) => [...prev, step]);
                setStep(nextStep);
            };

            const handleBack = () => {
                if (history.length === 0) return;
                const prev = history[history.length - 1];
                setHistory((h) => h.slice(0, -1));
                setStep(prev);
            };

            const handleRestart = () => {
                setStep("start");
                setHistory([]);
                setAnswered({});
            };

            const qNumber = isQuestion ? Object.keys(questions).indexOf(step) + 1 : null;
            const totalQ = Object.keys(questions).length;

            return (
                <div style={styles.root}>
                    <div style={styles.bgDecor1} />
                    <div style={styles.bgDecor2} />
                    <div style={styles.container}>
                        <header style={styles.header}>

                            <h1 style={styles.title}>
                                <span style={styles.titleSub}>藤崎竜版</span>
                                <br />
                                封神演義
                                <br />
                                <span style={styles.titleMain}>キャラタイプ診断</span>
                            </h1>
                            <p style={styles.headerNote}>
                                ※公式診断ではなく、ファン向け性格フローチャートです
                            </p>
                        </header>
                        <main style={styles.card}>
                            {isStart && <StartScreen onStart={() => setStep("q1")} />}
                            {isQuestion && (
                                <QuestionScreen
                                    question={currentQ}
                                    qNumber={qNumber}
                                    totalQ={totalQ}
                                    onAnswer={handleAnswer}
                                    onBack={history.length > 0 ? handleBack : null}
                                />
                            )}
                            {isResult && <ResultScreen result={currentR} onRestart={handleRestart} />}
                        </main>
                        <footer style={styles.footer}>
                            藤崎竜「封神演義」の人物をもとにしたファン向けコンテンツです
                        </footer>
                    </div>
                </div>
            );
        }

            );

        function QuestionScreen({ question, qNumber, totalQ, onAnswer, onBack }) {
            const progress = (qNumber / totalQ) * 100;

            return (
                <div style={styles.qWrap}>
                    <div style={styles.progressTrack}>
                        <div style={{ ...styles.progressBar, width: `${progress}%` }} />
                    </div>
                    <div style={styles.qNumRow}>
                        <span style={styles.qNum}>Q{qNumber}</span>
                        <span style={styles.qTotal}>/ {totalQ}</span>
                    </div>
                    <div style={styles.qTextBox}>
                        <p style={styles.qText}>
                            {question.text.split("\n").map((line, i) => (
                                <span key={i}>
                                    {line}
                                    {i < question.text.split("\n").length - 1 && <br />}
                                </span>
                            ))}
                        </p>
                    </div>
                    <div style={styles.answerRow}>
                        <button style={{ ...styles.answerBtn, ...styles.answerYes }} onClick={() => onAnswer("yes")}>
                            <span style={styles.answerIcon}>✓</span>
                            はい
                        </button>
                        <button style={{ ...styles.answerBtn, ...styles.answerNo }} onClick={() => onAnswer("no")}>
                            <span style={styles.answerIcon}>✗</span>
                            いいえ
                        </button>
                    </div>
                    {onBack && (
                        <button style={styles.backBtn} onClick={onBack}>
                            ← 前の質問に戻る
                        </button>
                    )}
                </div>
            );
        }

        function ResultScreen({ result, onRestart }) {
            const grad = `linear-gradient(135deg, ${result.from}, ${result.to})`;

            return (

                                    style={{

                                        color: "#fff",
                                    }}

                                    {k}
                                </span>
                            ))}
                        </div>
                    </div>
                    <div style={styles.rCatch}>「{result.catchcopy}」</div>
                    <p style={styles.rDesc}>{result.desc}</p>
                    <button style={styles.restartBtn} onClick={onRestart}>
                        もう一度診断する
                    </button>
                </div>
            );
        }
